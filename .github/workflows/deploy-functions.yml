name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المشروع
        uses: actions/checkout@v4

      - name: تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت الاعتماديات
        working-directory: functions
        run: npm install

      - name: تثبيت Firebase CLI
        run: npm install -g firebase-tools

      - name: نشر الـ Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > firebase-service-account.json
          firebase deploy --only functions,firestore:rules --project halousha-daecb --non-interactive
