name: Build Halousha APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # يسمح لك بتشغيل البناء يدوياً من تبويب Actions بدون رفع تعديل جديد

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: استنساخ المشروع
        uses: actions/checkout@v4

      - name: تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: تثبيت Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: بناء APK (نسخة Debug — تركيب مباشر بدون متجر)
        run: gradle assembleDebug

      - name: رفع APK كملف جاهز للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Halousha-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
